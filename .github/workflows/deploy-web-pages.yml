name: Build Web and Publish to meiloorun.github.io/samitracker

on:
  push:
    branches: [master]
    paths:
      - "client/**"
      - ".github/workflows/deploy-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export static web app
        env:
          EXPO_PUBLIC_WEB_BASE_PATH: "/samitracker"
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_API_LOCAL_URL: ""
          EXPO_PUBLIC_API_LOCAL_HEALTH_TIMEOUT_MS: "2500"
          EXPO_PUBLIC_API_DEBUG: "false"
        run: npm run web:export

      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          repository: meiloorun/meiloorun.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-repo

      - name: Sync static files into /samitracker
        working-directory: .
        run: |
          rm -rf pages-repo/samitracker
          mkdir -p pages-repo/samitracker
          cp -R client/dist/. pages-repo/samitracker/
          touch pages-repo/.nojekyll

      - name: Commit and push to Pages repo
        working-directory: ./pages-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add samitracker .nojekyll
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "Deploy samitracker from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin main
