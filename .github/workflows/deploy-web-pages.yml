name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/deploy-web-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set web base path for Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "EXPO_PUBLIC_WEB_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "EXPO_PUBLIC_WEB_BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
          fi

      - name: Export static web app
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_API_LOCAL_URL: ""
          EXPO_PUBLIC_API_LOCAL_HEALTH_TIMEOUT_MS: "2500"
          EXPO_PUBLIC_API_DEBUG: "false"
        run: npm run web:export

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
