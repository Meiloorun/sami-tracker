name: Android Release APK

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: npm ci

      - name: Decode signing keystore
        working-directory: client/android/app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing secret: ANDROID_KEYSTORE_BASE64" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > samitracker-upload-key.keystore

      - name: Create Android local.properties
        working-directory: client/android
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Build release APK
        working-directory: client/android
        env:
          MYAPP_UPLOAD_STORE_FILE: samitracker-upload-key.keystore
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPO_PUBLIC_API_BASE_URL: ${{ vars.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_API_LOCAL_URL: ${{ vars.EXPO_PUBLIC_API_LOCAL_URL }}
          EXPO_PUBLIC_API_LOCAL_HEALTH_TIMEOUT_MS: ${{ vars.EXPO_PUBLIC_API_LOCAL_HEALTH_TIMEOUT_MS }}
          EXPO_PUBLIC_API_DEBUG: "false"
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          APP_VERSION_TAG="${GITHUB_REF_NAME:-manual-${GITHUB_RUN_NUMBER}}"
          cp android/app/build/outputs/apk/release/app-release.apk "android/app/build/outputs/apk/release/sami-tracker-${APP_VERSION_TAG}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sami-tracker-apk
          path: client/android/app/build/outputs/apk/release/sami-tracker-*.apk

      - name: Attach APK to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: client/android/app/build/outputs/apk/release/sami-tracker-*.apk
